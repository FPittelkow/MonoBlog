---
layout: default
permalink: /search
title: Search
---

<section>
  <h1>Search</h1>

  <div class="form">
    <fieldset class="form-group">
      <label for="search-query">Search posts</label>
      <input id="search-query" class="form-control" type="search"
             placeholder="Title, description, category, tag..." autocomplete="off" />
    </fieldset>
  </div>

  <p id="search-count" class="t-hackcss-search-count"></p>

  <div id="search-results"></div>
</section>

<script>
  window.searchDataUrl = {{ "/search.json" | prepend: site.baseurl | jsonify }};
</script>
<script src="{{ "/js/search.js" | prepend: site.baseurl }}"></script>
