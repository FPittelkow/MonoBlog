# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: MonoBlog
description: > # this means to ignore newlines until "baseurl:"
  A minimalistic theme for Jekyll, based on hack.css
repository: https://github.com/wemake-services/jekyll-theme-hackcss
baseurl: # the subpath of your site, e.g. /blog
url: https://wemake-services.github.io  # the base hostname & protocol for your site

# Build settings
markdown: kramdown

# Sass settings
sass:
  style: compressed

# Theme settings
theme_mode: standard  # choices are: 'dark', 'standard', 'markdown'

# Customizations
your_name: monointerferenz
email: post@monointerferenz.de

navigation:
  - text: Home
    url: /
  - text: Text
    url: /text
  - text: Tools
    url: /tools
  - text: Tags
    url: /tags
    secondary: true
  - text: Search
    url: /search
    secondary: true
