<div class="t-hackcss-navigation">
  <h2 class="t-hackcss-navigation-heading"><a href="{{ site.baseurl }}/" style="background-color: #fff; color: #252a2e; border-bottom:0px solid">
  MonoBlog</a></h2>

  <nav class="menu" role="menubar">
    {% assign url = page.url|remove:'index.html' %}
    {% assign secondary_started = false %}
    {% for link in site.navigation %}
      {% if link.spacer %}
        <!-- <div class="t-hackcss-navigation-separator" aria-hidden="true"></div> -->
        <div style="text-align: center;">&#x23BD;</div>
      {% else %}
        <a class="menu-item {% if link.secondary %}t-hackcss-navigation-secondary{% endif %} {% if url == link.url %}active{% endif %}"
          role="menuitem" href="{{ link.url | prepend: site.baseurl }}" title="{{ link.title }}"{% if link.target %} target="{{ link.target }}"{% endif %}{% if link.target == '_blank' %} rel="noopener noreferrer"{% endif %}>
          {{ link.text }} <div class="pull-right">»</div>
        </a>
  {% endif %}
{% endfor %}
  </nav>

</div>
